<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXUS — Front Desk (Live Calls)</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{ --accent:#0d9488; --accent-soft:#ccfbf1; --ink:#111827; --sub:#6b7280; --line:#ececec; --bg:#ffffff; --soft:#fafafa; }
  *,::before,::after{ box-sizing:border-box; border-width:0; border-style:solid; border-color:var(--line); }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Inter','Segoe UI',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  input,select,textarea{ -webkit-appearance:none; appearance:none; border:1px solid var(--line); border-radius:12px; background-color:#fff; background-clip:padding-box; outline:none; box-shadow:none; color:inherit; }
  input:focus,select:focus,textarea:focus{ border-color:var(--accent); box-shadow:0 0 0 2px rgba(13,148,136,.12); outline:none; }
  select{ background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>"); background-repeat:no-repeat; background-position:right 8px center; padding-right:26px; }
  a{ color:inherit; text-decoration:none; }
  .sub{ color:var(--sub); } .line{ border-color:var(--line); } .soft{ background:var(--soft); }
  .accent{ background:var(--accent); } .accent-t{ color:var(--accent); }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  button:focus-visible,input:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .nav{ color:var(--sub); border-radius:12px; transition:.15s; } .nav:hover{ background:rgba(13,148,136,0.08); color:#0D9488; } .nav.on{ background:var(--accent); color:#fff; } .nav.on:hover{ background:#0F766E; color:#fff; }
  button{ transition:background .2s ease, color .2s ease, border-color .2s ease, box-shadow .2s ease, transform .12s ease; }
  button:active{ transform:scale(0.98); }
  .approve-btn:hover{ background:#0F766E; box-shadow:0 8px 18px rgba(13,148,136,0.25); transform:translateY(-1px); }
  .ack-btn:hover{ background:#B91C1C !important; box-shadow:0 8px 18px rgba(220,38,38,0.25); transform:translateY(-1px); }
  .edit-btn:hover{ background:#F3F4F6; border-color:#E5E7EB; color:#111827; }
  .reject-btn:hover{ background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.18); color:#DC2626; }
  .listen-btn:hover{ background:#F3F4F6; color:#0D9488; }
  .lift-btn:hover{ transform:translateY(-1px); filter:brightness(0.95); box-shadow:0 8px 18px rgba(0,0,0,0.12); }
  .hover-lift{ transition:transform .18s ease, box-shadow .18s ease; } .hover-lift:hover{ transform:translateY(-1px); box-shadow:0 8px 22px rgba(0,0,0,0.06); }
  .card-exit{ transition:opacity .25s ease, transform .25s ease; }
  .card-exit.removing{ opacity:0; transform:translateY(-8px); pointer-events:none; }
  .chat-anim{ transition:height .35s ease-in-out, box-shadow .35s ease-in-out, border-radius .35s ease-in-out; overflow:hidden; }
  .col-anim{ transition:width .35s ease-in-out, margin .35s ease-in-out, opacity .3s ease-in-out; }
  .backdrop{ position:absolute; inset:0; background:rgba(15,23,42,.4); animation:bdin .22s ease; }
  @keyframes bdin{ from{opacity:0;} to{opacity:1;} }
  .modal-in{ animation:modin .26s cubic-bezier(.2,.8,.2,1); }
  @keyframes modin{ from{opacity:0; transform:scale(.97);} to{opacity:1; transform:scale(1);} }
  .main-dots{ background-color:#fff; background-image:radial-gradient(rgba(100,116,139,0.18) 1.2px, transparent 1.2px); background-size:18px 18px; }
  #loader{ position:fixed; inset:0; z-index:9999; background:#0D9488; display:flex; align-items:center; justify-content:center; transition:opacity .45s ease; }
  #loader.hide{ opacity:0; pointer-events:none; }
  .loader-logo{ animation:loaderPulse 1.25s ease-in-out infinite; }
  @keyframes loaderPulse{ 0%,100%{ transform:scale(1); opacity:.82; } 50%{ transform:scale(1.07); opacity:1; } }
  .card{ background:#fff; border:1px solid var(--line); border-radius:16px; }
  .row:hover{ background:var(--soft); }
  .fade{ animation:f .25s ease-out; } @keyframes f{ from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:none;} }
  .live{ animation:pulse 1.4s infinite; } @keyframes pulse{ 0%{opacity:1;} 50%{opacity:.35;} 100%{opacity:1;} }
  .ring{ animation:rng 1s infinite; } @keyframes rng{ 0%,100%{transform:rotate(0);} 25%{transform:rotate(-12deg);} 75%{transform:rotate(12deg);} }
  .call-icon-wrapper{ position:relative; display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; flex:none; color:#0D9488; }
  .call-icon{ animation:phoneRing 1.2s ease-in-out infinite; transform-origin:center; }
  .call-icon-wrapper::before{ content:''; position:absolute; inset:0; border-radius:50%; border:1px solid rgba(13,148,136,0.35); animation:callPulse 1.4s ease-out infinite; }
  @keyframes phoneRing{ 0%{transform:rotate(0) scale(1);} 20%{transform:rotate(-12deg) scale(1.05);} 40%{transform:rotate(12deg) scale(1.08);} 60%{transform:rotate(-8deg) scale(1.04);} 80%{transform:rotate(8deg) scale(1.02);} 100%{transform:rotate(0) scale(1);} }
  @keyframes callPulse{ 0%{transform:scale(1); opacity:.5;} 100%{transform:scale(1.6); opacity:0;} }
  .emergency-dot{ width:10px; height:10px; border-radius:50%; background:#EF4444; box-shadow:0 0 10px rgba(239,68,68,0.8); animation:emergencyDotPulse 1.3s ease-in-out infinite; display:inline-block; flex:none; }
  @keyframes emergencyDotPulse{ 0%{transform:scale(1); box-shadow:0 0 6px rgba(239,68,68,0.5);} 50%{transform:scale(1.25); box-shadow:0 0 18px rgba(239,68,68,1);} 100%{transform:scale(1); box-shadow:0 0 6px rgba(239,68,68,0.5);} }
  .emergency-icon{ color:#EF4444; animation:emergencyGlow 1.4s ease-in-out infinite; }
  @keyframes emergencyGlow{ 0%{filter:drop-shadow(0 0 2px rgba(239,68,68,0.4));} 50%{filter:drop-shadow(0 0 10px rgba(239,68,68,0.9));} 100%{filter:drop-shadow(0 0 2px rgba(239,68,68,0.4));} }
  @media (prefers-reduced-motion: reduce){ .call-icon,.call-icon-wrapper::before,.emergency-dot,.emergency-icon{ animation:none; } }
  .nice-scroll{ overflow-x:hidden; scroll-behavior:smooth; }
  .nice-scroll::-webkit-scrollbar{ width:6px; }
  .nice-scroll::-webkit-scrollbar-track{ background:transparent; }
  .nice-scroll::-webkit-scrollbar-thumb{ background:rgba(13,148,136,0.35); border-radius:999px; }
  .nice-scroll::-webkit-scrollbar-thumb:hover{ background:rgba(13,148,136,0.6); }
  ::-webkit-scrollbar{ width:8px; } ::-webkit-scrollbar-thumb{ background:#e4e4e7; border-radius:4px; }
</style>
</head>

78 0.395691 36.7486 0.858849 38.2525 1.78516C39.7565 2.68943 40.9237 3.96862 41.7542 5.62276C42.5847 7.25484 43 9.17364 43 11.3792C43 13.6067 42.5847 15.5476 41.7542 17.2017C40.9237 18.8338 39.7565 20.113 38.2525 21.0393C36.7486 21.9436 34.9978 22.3957 33 22.3957Z" fill="#fff"/><path d="M52.0605 0.0167994C53.9566 0.0167994 54.7263 -0.161228 56.377 0.641799C56.5108 0.797934 56.7201 0.498297 57.7246 0.498245C58.3941 0.498245 58.6624 0.843935 58.7295 1.0002L58.084 6.24043C57.9501 6.32966 57.7709 6.37422 57.5479 6.37422C57.3026 6.37416 57.0796 6.29593 56.8789 6.13985L55.9756 2.3586C54.7264 1.82325 53.4213 1.55586 52.0605 1.55586C50.4768 1.55587 49.2607 1.87967 48.4131 2.52657C47.5657 3.1511 47.1417 4.06547 47.1416 5.26973C47.1416 5.98355 47.2981 6.59749 47.6104 7.11055C47.9449 7.62348 48.5136 8.10299 49.3164 8.54903C50.1417 8.99513 51.2797 9.46359 52.7295 9.9543C55.161 10.802 56.8899 11.706 57.916 12.6652C58.942 13.6244 59.455 14.8396 59.4551 16.3117C59.4551 18.1632 58.7639 19.6248 57.3809 20.6955C55.9979 21.7438 54.0795 22.2677 51.626 22.2678C50.4884 22.2678 49.395 22.1568 48.3467 21.9338C47.2983 21.6884 46.4169 21.3537 45.7031 20.9299C45.5693 20.7738 45.4465 20.6063 45.335 20.4279C45.2235 20.2496 45.1343 20.0821 45.0674 19.926L45 15.7434C45.1338 15.6541 45.3131 15.6096 45.5361 15.6096C45.7814 15.6096 46.0044 15.6879 46.2051 15.8439L47.1084 19.8254C47.7329 20.093 48.4243 20.305 49.1826 20.4611C49.9634 20.6173 50.7783 20.6955 51.626 20.6955C53.4773 20.6955 54.9163 20.3162 55.9424 19.5578C56.9907 18.7771 57.5146 17.6947 57.5146 16.3117C57.5146 15.2411 57.1353 14.3715 56.377 13.7023C55.6185 13.0108 54.2797 12.3414 52.3613 11.6945C50.5993 11.1146 49.1939 10.5233 48.1455 9.9211C47.1196 9.29661 46.3727 8.61607 45.9043 7.88008C45.4582 7.12164 45.2344 6.25124 45.2344 5.26973C45.2344 3.61915 45.8375 2.33661 47.042 1.42207C48.2465 0.485329 49.9193 0.0168116 52.0605 0.0167994Z" fill="#fff"/></svg></div>

<script>
  (function(){
    function hide(){ var l=document.getElementById('loader'); if(l) l.classList.add('hide'); }
    var t=setInterval(function(){ var r=document.getElementById('root'); if(r && r.children.length){ clearInterval(t); setTimeout(hide,350); } },80);
    setTimeout(function(){ clearInterval(t); hide(); }, 4000);
  })();
</script>
<script>tailwind.config={corePlugins:{preflight:false}};</script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ---------- urgency tiers ---------- */
const TIER = {
  Routine:   { dot:'#10b981', bg:'#dcfce7', fg:'#15803d' },
  Soon:      { dot:'#f59e0b', bg:'#fef3c7', fg:'#a16207' },
  Urgent:    { dot:'#f97316', bg:'#ffedd5', fg:'#c2410c' },
  Emergency: { dot:'#ef4444', bg:'#fee2e2', fg:'#b91c1c' },
};
function Tier({ t }){ if(!t) return null; const u=TIER[t]; return <span className="text-[11px] font-semibold px-2 py-0.5 rounded-full" style={{background:u.bg,color:u.fg}}>{t}</span>; }

const STATUS = {
  ringing:        { label:'Ringing',          c:'#94a3b8' },
  talking:        { label:'AI talking',        c:'#0d9488' },
  triaging:       { label:'Screening urgency', c:'#0891b2' },
  'await-approval':{ label:'Booking — approve', c:'#f59e0b' },
  emergency:      { label:'EMERGENCY',         c:'#ef4444' },
  booked:         { label:'Booked',            c:'#10b981' },
  ended:          { label:'Ended',             c:'#94a3b8' },
};

const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat']; const DATES=[2,3,4,5,6,7]; const HOURS=[8,9,10,11,12,13,14,15,16]; const TODAY=0;
function nextSlot(bookings, tier){
  const day = Math.min(tier==='Urgent'?TODAY:tier==='Soon'?TODAY+1:TODAY+3,5);
  for(const h of HOURS){ if(!bookings.some(b=>b.day===day&&b.hour===h)) return {day,hour:h,time:`${String(h).padStart(2,'0')}:00`}; }
  return {day,hour:16,time:'16:00'};
}
const L=(who,t)=>({line:{who,t}});

/* ---------- call scripts (each event consumes a tick) ---------- */
function makeCalls(){
  return [
    { id:'c1', phone:'079 0011 2233', status:'ringing', name:null,dob:null,symptoms:null,urgency:null,proposed:null, lines:[], secs:0, queue:[
      {},
      {...L('ai','Oakfield Surgery, AI assistant speaking. Can I take your name?'), status:'talking'},
      {...L('pt','Margaret Hughes.'), set:{name:'Margaret Hughes', mrn:'OAK-04821'}},
      L('ai','Thanks Margaret. And your date of birth?'),
      {...L('pt','14th of March 1957.'), set:{dob:'14 Mar 1957'}},
      L('ai','What can I help with today?'),
      {...L('pt','A sore throat and a fever for three days.'), set:{symptoms:'Sore throat + fever, 3 days'}},
      {...L('ai','Any difficulty breathing or swallowing, or swelling in your neck?'), status:'triaging'},
      {...L('pt','No, nothing like that.'), set:{urgency:'Soon'}},
      {...L('ai','That doesn\'t sound urgent but is worth a GP call. I can book you in — let me confirm with the practice.'), status:'await-approval', set:{proposed:{reason:'Sore throat + fever 3d · no red flags', urgency:'Soon'}}},
    ]},
    { id:'c2', phone:'078 5544 9090', status:'ringing', name:null,dob:null,symptoms:null,urgency:null,proposed:null, lines:[], secs:0, queue:[
      {},{},
      {...L('ai','Oakfield Surgery, can I take your name?'), status:'talking'},
      {...L('pt','Tom Bennett… I\'ve got a crushing pain in my chest and my left arm, started 20 minutes ago, feeling sick.'), set:{name:'Tom Bennett', mrn:'OAK-07734', symptoms:'Chest pain radiating to L arm, acute onset + nausea'}},
      {...L('sys','⚠ RED FLAG — possible cardiac event. Booking suppressed.'), set:{urgency:'Emergency'}, status:'emergency'},
      L('ai','Tom, this needs emergency help right now — please call 999 immediately or get to A&E. I\'m alerting the duty team. Don\'t drive yourself.'),
    ]},
    { id:'c3', phone:'077 2200 1188', status:'ringing', name:null,dob:null,symptoms:null,urgency:null,proposed:null, lines:[], secs:0, queue:[
      {},{},{},
      {...L('ai','Oakfield Surgery, AI assistant. Your name please?'), status:'talking'},
      {...L('pt','Aisha Khan.'), set:{name:'Aisha Khan', mrn:'OAK-05190'}},
      L('ai','Thanks Aisha, date of birth?'),
      {...L('pt','22nd November 1995.'), set:{dob:'22 Nov 1995'}},
      L('ai','How can I help?'),
      {...L('pt','Hay fever — itchy eyes and sneezing.'), set:{symptoms:'Hay fever symptoms',urgency:'Routine'}},
      {...L('ai','A pharmacist can help with that today, but I can also book a routine GP review if you\'d prefer — let me confirm.'), status:'await-approval', set:{proposed:{reason:'Hay fever · routine review', urgency:'Routine'}}},
    ]},
    { id:'c4', phone:'079 8800 4747', status:'ringing', name:null,dob:null,symptoms:null,urgency:null,proposed:null, lines:[], secs:0, queue:[
      {},{},{},{},{},
      {...L('ai','Oakfield Surgery. Can I take your name?'), status:'talking'},
      {...L('pt','David Okafor.'), set:{name:'David Okafor', mrn:'OAK-06320'}},
      L('ai','Thanks David, date of birth?'),
      {...L('pt','2nd September 1981.'), set:{dob:'02 Sep 1981'}},
      L('ai','What do you need today?'),
      {...L('pt','A blood pressure review, and I ran out of my tablets.'), set:{symptoms:'BP review + repeat medication',urgency:'Soon'}},
      {...L('ai','I\'ll sort the review and flag the repeat. Let me book you in.'), status:'await-approval', set:{proposed:{reason:'BP review + repeat meds', urgency:'Soon'}}},
    ]},
  ];
}

/* ---------- phone icon (replaces 📞 emoji) ---------- */
function PhoneIcon({ size=18, cls='' }){
  return (
    <svg className={cls} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 4h4l2 5-2 1a11 11 0 005 5l1-2 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2"/>
    </svg>
  );
}
function PhoneRing(){ return <span className="call-icon-wrapper"><PhoneIcon size={15} cls="call-icon"/></span>; }
function AlertIcon({ size=18, cls='' }){
  return (
    <svg className={cls} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  );
}
function EmergencyBadgeIcon({ size=16 }){
  return <span className="inline-flex items-center justify-center" style={{background:'rgba(239,68,68,0.12)',borderRadius:999,padding:6}}><AlertIcon size={size} cls="emergency-icon"/></span>;
}
function MaxIcon({ expanded }){
  return (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {expanded
        ? <path d="M9 9H4M9 9V4M15 9h5M15 9V4M9 15H4M9 15v5M15 15h5M15 15v5"/>
        : <path d="M8 3H5a2 2 0 00-2 2v3M16 3h3a2 2 0 012 2v3M16 21h3a2 2 0 002-2v-3M8 21H5a2 2 0 01-2-2v-3"/>}
    </svg>
  );
}

/* ---------- Live Calls board ---------- */
function CallCard({ c, active, onClick, onCallback }){
  const st = STATUS[c.status]; const ident = c.name || 'Identifying…';
  const mmss = `${String(Math.floor(c.secs/60)).padStart(2,'0')}:${String(c.secs%60).padStart(2,'0')}`;
  const liveDot = !['booked','ended'].includes(c.status);
  const missed = c.urgency==='Urgent' && c.status==='ended';
  // calls that leave the board: booked, acknowledged emergency, or ended (non-urgent) → fade out then unmount
  const shouldLeave = c.status==='booked' || c.ack || (c.status==='ended' && c.urgency!=='Urgent');
  const [leaving,setLeaving] = useState(false);
  const [removed,setRemoved] = useState(false);
  useEffect(()=>{ if(shouldLeave){ setLeaving(true); const t=setTimeout(()=>setRemoved(true),300); return ()=>clearTimeout(t); } },[shouldLeave]);
  if(removed) return null;
  return (
    <div onClick={onClick} className={`card hover-lift card-exit p-3 mb-2 fade cursor-pointer ${active?'ring-2':''} ${leaving?'removing':''}`} style={active?{boxShadow:'0 0 0 2px var(--accent)'}:c.status==='emergency'?{borderColor:'#fca5a5'}:{}}>
      <div className="flex items-center gap-2">
        {c.status==='ringing' ? <PhoneRing/> : c.status==='emergency' ? <span className="emergency-dot"></span> : <span className={liveDot?'live':''} style={{color:st.c}}>●</span>}
        <div className="flex-1 min-w-0">
          <div className="text-sm font-medium truncate">{ident}</div>
          <div className="text-xs sub truncate">{c.mrn?`MRN ${c.mrn}`:c.phone}</div>
        </div>
        {c.urgency && <Tier t={c.urgency}/>}
      </div>
      <div className="flex items-center justify-between mt-2">
        <span className="text-[11px] font-medium px-2 py-0.5 rounded-full" style={{background:st.c+'22',color:st.c}}>{st.label}</span>
        <span className="text-[11px] sub font-mono">{c.status==='ringing'?'—':mmss}</span>
      </div>
      {missed && (
        <button onClick={e=>{e.stopPropagation();onCallback(c);}} className="lift-btn mt-2 w-full text-sm py-1.5 rounded-lg text-white flex items-center justify-center gap-1.5" style={{background:c.urgency==='Emergency'?'#dc2626':'#f97316'}}>
          <PhoneIcon size={15}/> Call back
        </button>

function CallDetail({ c, overlay, onToggleExpand }){
  const boxRef = useRef(null);
  const prevLen = useRef(0);
  const [atBottom,setAtBottom] = useState(true);
  const [hasNew,setHasNew] = useState(false);

  // reset when switching calls
  useEffect(()=>{
    setAtBottom(true); setHasNew(false);
    prevLen.current = c ? c.lines.length : 0;
    requestAnimationFrame(()=>{ const el=boxRef.current; if(el) el.scrollTop = el.scrollHeight; });
  },[c&&c.id]);

  // new line arrived
  useEffect(()=>{
    const el = boxRef.current; if(!el||!c) return;
    if(c.lines.length > prevLen.current){
      if(atBottom) el.scrollTop = el.scrollHeight; else setHasNew(true);
    }
    prevLen.current = c.lines.length;
  },[c&&c.lines.length]);

  function onScroll(){
    const el = boxRef.current; if(!el) return;
    const near = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    setAtBottom(near); if(near) setHasNew(false);
  }
  function jumpBottom(){ const el=boxRef.current; if(el) el.scrollTop=el.scrollHeight; setHasNew(false); setAtBottom(true); }

  const h = overlay ? 'calc(100vh - 90px)' : 600;
  if(!c) return (
    <div className="card flex flex-col items-center justify-center gap-2" style={{height:h}}>
      <span style={{color:'#cbd5e1'}}><PhoneIcon size={28}/></span>
      <div className="text-sm font-medium" style={{color:'#6b7280'}}>No call selected</div>
      <div className="text-xs sub">Pick a caller on the left to listen in.</div>
    </div>
  );
  const st = STATUS[c.status];
  return (
    <div className="card flex flex-col" style={{height:h, width:'100%'}}>
      <div className="px-4 py-3 border-b line flex items-center justify-between gap-3">
        <div className="min-w-0">
          <div className="text-sm font-semibold truncate">{c.name||'Identifying caller…'}</div>
          <div className="text-xs sub truncate">{c.mrn?`MRN ${c.mrn} · `:''}{c.phone}{c.dob?` · DOB ${c.dob}`:''}</div>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          <span className="text-[11px] font-medium px-2 py-0.5 rounded-full" style={{background:st.c+'22',color:st.c}}>{st.label}</span>
          <button onClick={onToggleExpand} title={overlay?'Close':'Expand chat'} className="sub border line rounded-lg p-1.5 hover:bg-gray-50">
            <MaxIcon expanded={overlay}/>
          </button>
        </div>
      </div>
      {/* transcript */}
      <div className="relative flex-1 min-h-0">
        <div ref={boxRef} onScroll={onScroll} className="nice-scroll h-full overflow-y-auto p-4 space-y-2" style={{scrollBehavior:'smooth'}}>
          <div className="text-[11px] sub uppercase tracking-wide mb-1">Live transcript</div>
          {c.lines.length===0 && <div className="sub text-sm">Connecting…</div>}
          {c.lines.map((m,i)=> m.who==='sys' ? (
            <div key={i} className="text-center text-xs rounded-md py-1.5 px-3 fade" style={{background:'#fef2f2',color:'#b91c1c'}}>{m.t}</div>
          ) : (
            <div key={i} className={`flex ${m.who==='ai'?'justify-start':'justify-end'} fade`}>
              <div className={`max-w-[80%] rounded-2xl px-3 py-2 text-sm ${m.who==='ai'?'accent text-white rounded-tl-sm':'soft border line rounded-tr-sm'}`} style={{...(m.who!=='ai'?{background:'var(--soft)'}:{}),wordBreak:'break-word'}}>{m.t}</div>
            </div>
          ))}
        </div>
        {hasNew && <button onClick={jumpBottom} className="lift-btn absolute left-1/2 -translate-x-1/2 bottom-3 accent text-white text-xs px-3 py-1.5 rounded-full shadow-lg">New messages ↓</button>}
      </div>
      {/* captured strip */}
      <div className="border-t line p-3 grid grid-cols-4 gap-2 text-xs">
        <Cap l="Name" v={c.name}/><Cap l="DOB" v={c.dob}/><Cap l="Symptoms" v={c.symptoms}/>
        <div><div className="sub">Urgency</div>{c.urgency?<Tier t={c.urgency}/>:<span className="sub">—</span>}</div>
      </div>
    </div>
  );
}
function Cap({l,v}){ return <div><div className="sub">{l}</div><div className="font-medium truncate">{v||'—'}</div></div>; }

function ApprovalCard({ c, onApprove, onReject, onEdit, onAck, onOpen }){
  const [expand,setExpand] = useState(false);
  const [editing,setEditing] = useState(false);
  const [touched,setTouched] = useState(false);
  const [reason,setReason] = useState(c.proposed?c.proposed.reason:'');
  const defDay = c.proposed ? Math.min(c.proposed.urgency==='Urgent'?0:c.proposed.urgency==='Soon'?1:3,5) : 0;
  const [day,setDay] = useState(defDay);
  const [hour,setHour] = useState(9);
  const [removing,setRemoving] = useState(false);
  function act(fn){ setRemoving(true); setTimeout(fn, 240); }   // animate out, then commit
  if(c.status==='emergency'){
    return (
      <div className={`card card-exit p-4 mb-3 fade ${removing?'removing':''}`} style={{borderColor:'#fca5a5'}}>
        <div className="text-sm font-semibold flex items-center gap-2" style={{color:'#b91c1c'}}><EmergencyBadgeIcon/> Emergency — {c.name}</div>
        {c.mrn && <div className="text-[11px] sub">MRN {c.mrn}</div>}
        <div className="text-xs sub mt-1">{c.symptoms}</div>
        <div className="text-xs mt-1" style={{color:'#b91c1c'}}>999 advised · no booking · duty team alerted.</div>
        <div className="flex gap-2 mt-3">
          <button onClick={()=>onOpen(c.id)} className="listen-btn text-sm px-3 py-1.5 rounded-lg border line">Listen in</button>
          <button onClick={()=>act(()=>onAck(c))} className="ack-btn text-white text-sm px-3 py-1.5 rounded-lg flex-1" style={{background:'#dc2626'}}>Acknowledge</button>
        </div>
      </div>
    );
  }
  return (
    <div className={`card card-exit p-4 mb-3 fade ${removing?'removing':''}`} style={{borderColor:'#fcd34d'}}>
      <button onClick={()=>onOpen(c.id)} className="text-left w-full">
        <div className="text-sm font-semibold">Proposed: Book {c.proposed.urgency==='Routine'?'routine':c.proposed.urgency.toLowerCase()} GP slot</div>
        <div className="text-xs sub mt-0.5">{c.name}{c.mrn?` · MRN ${c.mrn}`:''}</div>
      </button>
      {editing
        ? (
          <div className="mt-2 space-y-2">
            <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="Reason" className="w-full px-3 py-2 rounded-lg soft border line text-sm" style={{background:'var(--soft)'}}/>
            <div className="flex gap-2">
              <select value={day} onChange={e=>setDay(+e.target.value)} className="flex-1 px-2 py-2 rounded-lg soft border line text-sm" style={{background:'var(--soft)'}}>
                {DAYS.map((d,i)=><option key={i} value={i}>{d} {DATES[i]}</option>)}
              </select>
              <select value={hour} onChange={e=>setHour(+e.target.value)} className="px-2 py-2 rounded-lg soft border line text-sm" style={{background:'var(--soft)'}}>
                {HOURS.map(h=><option key={h} value={h}>{String(h).padStart(2,'0')}:00</option>)}
              </select>
            </div>
            <div className="text-[11px] sub">Appointment set for <b>{DAYS[day]} {DATES[day]} · {String(hour).padStart(2,'0')}:00</b></div>
          </div>
        )
        : <div className="text-xs sub mt-1.5">{c.proposed.urgency} · {c.proposed.reason}</div>}
      <div className="text-[11px] sub mt-1.5">Agent confidence: High</div>
      <button onClick={()=>setExpand(e=>!e)} className="text-[11px] accent-t mt-1.5">{expand?'▴ Less details':'▾ More details'}</button>
      {expand && (
        <div className="mt-2 border-t line pt-2 space-y-1 text-[11px] sub fade">
          <div>Captured from full call transcript · DOB {c.dob||'—'}</div>
          <div>Red-flag screen: negative</div>
          <div>Patient NOT notified until you approve.</div>
        </div>
      )}
      <div className="flex gap-2 mt-3">
        <button onClick={()=>act(()=>onApprove(c, touched?{reason, slot:{day,hour,time:`${String(hour).padStart(2,'0')}:00`}}:null))} className="approve-btn accent text-white text-sm py-2 rounded-lg flex-1">Approve</button>
        <button onClick={()=>{ setEditing(e=>!e); setTouched(true); }} className="edit-btn border line text-sm px-3 py-2 rounded-lg">{editing?'Done':'Edit'}</button>
        <button onClick={()=>act(()=>onReject(c))} className="reject-btn border line text-sm px-3 py-2 rounded-lg">Reject</button>
      </div>
    </div>
  );
}

function LiveCalls({ calls, sel, setSel, onApprove, onReject, onEdit, onAck, onCallback }){
  const [expanded,setExpanded] = useState(false);
  const isVisible = c=> !(c.status==='booked' || c.ack || (c.status==='ended' && c.urgency!=='Urgent'));
  const active = calls.filter(c=>!['booked','ended'].includes(c.status) && !c.ack);
  const board = calls;  // each CallCard fades itself out then unmounts when it leaves
  const visibleCount = calls.filter(isVisible).length;
  const selCall = calls.find(c=>c.id===sel && isVisible(c)) || null;  // chat clears once the selected call has left
  return (
    <div className="max-w-7xl mx-auto fade">
      {/* Header. Note: the descriptive helper text was intentionally removed from the UI per design. */}
      <div className="flex items-center gap-3 mb-5">
        <h1 className="text-2xl font-semibold tracking-tight">Live calls</h1>
        {active.length>0 && <span className="text-xs font-medium px-2 py-1 rounded-full" style={{background:'var(--accent-soft)',color:'#0f766e'}}>{active.length} on the line</span>}
      </div>
      <div className="flex items-start">
        <div style={{flex:'0 0 24%', marginRight:20}}>
          <div className="text-xs font-semibold sub uppercase tracking-wide mb-3">On the line</div>
          {board.map(c=><CallCard key={c.id} c={c} active={sel===c.id} onClick={()=>setSel(c.id)} onCallback={onCallback}/>)}
          {visibleCount===0 && (
            <div className="text-center py-12 px-4 rounded-2xl border border-dashed line fade" style={{background:'var(--soft)'}}>
              <div className="flex justify-center mb-2" style={{color:'#cbd5e1'}}><PhoneIcon size={24}/></div>
              <div className="text-sm font-medium" style={{color:'#6b7280'}}>No active calls</div>
              <div className="text-xs sub mt-0.5">Incoming calls appear here.</div>
            </div>
          )}
        </div>
        <div style={{flex:'1 1 0%', minWidth:0, marginRight:20}}><CallDetail c={selCall} onToggleExpand={()=>setExpanded(true)}/></div>
        <div style={{flex:'0 0 24%'}}><ApprovalsPanel calls={calls} onApprove={onApprove} onReject={onReject} onEdit={onEdit} onAck={onAck} onOpen={setSel}/></div>
      </div>
      {expanded && selCall && (
        <div className="fixed inset-0 z-30 flex items-center justify-center p-6" onClick={()=>setExpanded(false)}>
          <div className="backdrop"></div>
          <div className="modal-in relative w-full" style={{maxWidth:920}} onClick={e=>e.stopPropagation()}>
            <CallDetail c={selCall} overlay onToggleExpand={()=>setExpanded(false)}/>
          </div>
        </div>
      )}
    </div>
  );
}

  { id:'o6', name:'Aisha Khan',     mrn:'OAK-05190', dob:'22 Nov 1995', reason:'Hay fever advice', urgency:'Routine', time:'22:30', status:'pending', transcript:[['ai','What do you need?'],['pt','Itchy eyes, hay fever.'],['ai','A pharmacist can help with that — I\'ll note a routine review option too.']] },
  { id:'o7', name:'Derek Coombs',   mrn:'OAK-06077', dob:'03 Dec 1981', reason:'Fit note query', urgency:'Routine', time:'00:20', status:'pending', transcript:[['ai','How can I help?'],['pt','I need a fit note extended.'],['ai','I\'ll pass this to the admin team to action in the morning.']] },
];

function OvernightCard({ o, onConfirm, onReject }){
  const [open,setOpen] = useState(false);
  const [editing,setEditing] = useState(false);
  const [touched,setTouched] = useState(false);
  const [reason,setReason] = useState(o.reason);
  const defDay = Math.min(o.urgency==='Urgent'?0:o.urgency==='Soon'?1:3,5);
  const [day,setDay] = useState(defDay);
  const [hour,setHour] = useState(9);
  const u = TIER[o.urgency];
  const slot = o.urgency==='Urgent'?'Same-day today':o.urgency==='Soon'?'Within 48h':'Routine';
  return (
    <div className="card p-4 mb-2.5 fade" style={{borderLeft:'3px solid '+u.dot}}>
      <div className="flex items-start gap-4">
        {/* left: details */}
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-sm font-semibold">{o.name}</span>
            <Tier t={o.urgency}/>
            {o.urgency==='Urgent' && <span className="text-[10px] font-medium px-2 py-0.5 rounded-full" style={{background:'rgba(249,115,22,0.12)',color:'#c2410c'}}>Call back at open</span>}
            <span className="text-[11px] sub">· called {o.time}</span>
          </div>
          <div className="text-[11px] sub mt-0.5">MRN {o.mrn} · DOB {o.dob}</div>
          {editing ? (
            <div className="mt-2 space-y-2">
              <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="Reason" className="w-full px-3 py-1.5 text-sm" style={{background:'var(--soft)'}}/>
              <div className="flex gap-2">
                <select value={day} onChange={e=>setDay(+e.target.value)} className="flex-1 px-2 py-1.5 text-sm" style={{background:'var(--soft)'}}>
                  {DAYS.map((d,i)=><option key={i} value={i}>{d} {DATES[i]}</option>)}
                </select>
                <select value={hour} onChange={e=>setHour(+e.target.value)} className="px-2 py-1.5 text-sm" style={{background:'var(--soft)'}}>
                  {HOURS.map(h=><option key={h} value={h}>{String(h).padStart(2,'0')}:00</option>)}
                </select>
              </div>
              <div className="text-[11px] sub">Appointment: <b>{DAYS[day]} {DATES[day]} · {String(hour).padStart(2,'0')}:00</b></div>
            </div>
          ) : (
            <>
              <div className="text-sm mt-1.5">{o.reason}</div>
              <div className="flex items-center gap-2 mt-2 flex-wrap text-[11px]">
                <span className="px-2 py-0.5 rounded-full font-medium" style={{background:u.bg,color:u.fg}}>{slot}</span>
                <span className="sub">not yet notified</span>
                <button onClick={()=>setOpen(v=>!v)} className="accent-t font-medium">{open?'Hide transcript':'View transcript'}</button>
              </div>
            </>
          )}
          {open && !editing && <div className="mt-2 border-t line pt-2 space-y-1.5">{o.transcript.map((m,i)=>(<div key={i} className={`text-xs ${m[0]==='ai'?'accent-t':''}`}><b>{m[0]==='ai'?'AI':o.name.split(' ')[0]}:</b> {m[1]}</div>))}</div>}
        </div>
        {/* right: actions */}
        <div className="shrink-0 flex flex-col gap-2" style={{width:148}}>
          <button onClick={()=>onConfirm(o, touched?{reason, slot:{day,hour,time:`${String(hour).padStart(2,'0')}:00`}}:null)} className="approve-btn accent text-white text-sm py-2 rounded-lg">Confirm &amp; book</button>
          <div className="flex gap-2">
            <button onClick={()=>{ setEditing(e=>!e); setTouched(true); }} className="edit-btn border line text-sm py-1.5 rounded-lg flex-1">{editing?'Done':'Edit'}</button>
            <button onClick={()=>onReject(o)} className="reject-btn border line text-sm py-1.5 rounded-lg flex-1">Reject</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function MorningReview({ overnight, onConfirm, onEdit, onReject, onAck, onCallback }){
  const emergencies = overnight.filter(o=>o.urgency==='Emergency' && o.status==='pending');
  const bookings = overnight.filter(o=>o.urgency!=='Emergency' && o.status==='pending')
    .sort((a,b)=> ({Urgent:0,Soon:1,Routine:2}[a.urgency]-{Urgent:0,Soon:1,Routine:2}[b.urgency]));
  const totalHandled = OVERNIGHT_SEED.length;
  const urgentCount = bookings.filter(b=>b.urgency==='Urgent').length;
  const left = bookings.length+emergencies.length;
  const allClear = left===0;

  return (
    <div className="max-w-4xl mx-auto fade">
      <div className="flex items-baseline gap-3 mb-4">
        <h1 className="text-2xl font-semibold tracking-tight">Morning review</h1>
        <span className="text-xs sub">overnight · handled by AI while closed</span>
      </div>

      {/* summary bar */}
      <div className="card flex items-stretch py-3 px-2 mb-6">
        {[[totalHandled,'overnight calls',null,null],
          [urgentCount,'urgent · same-day','#c2410c','#f97316'],
          [OVERNIGHT_SEED.filter(o=>o.urgency==='Emergency').length,'emergency → 999','#b91c1c','#ef4444'],
          [left,'left to clear','#0D9488','#0D9488']
        ].map((s,i)=>(
          <React.Fragment key={i}>
            {i>0 && <div style={{width:1,background:'var(--line)',margin:'2px 0'}}></div>}
            <div className="flex items-center gap-2.5 px-5">
              {s[3] && <span className="w-2 h-2 rounded-full" style={{background:s[3]}}></span>}
              <span className="text-lg font-bold tabular-nums" style={{color:s[2]||'var(--ink)'}}>{s[0]}</span>
              <span className="text-xs sub">{s[1]}</span>
            </div>
          </React.Fragment>
        ))}
      </div>

      {allClear && (
        <div className="card p-10 text-center" style={{background:'var(--soft)'}}>
          <div className="flex justify-center mb-2" style={{color:'#22c55e'}}><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg></div>
          <div className="text-sm font-medium">Overnight queue cleared</div>
          <div className="text-xs sub mt-0.5">Everything from last night has been reviewed.</div>
        </div>
      )}

      {/* emergency awareness */}
      {emergencies.length>0 && (
        <div className="mb-6">
          <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{color:'#b91c1c'}}>Handled overnight — for your awareness</div>
          {emergencies.map(o=>(
            <div key={o.id} className="card p-4 mb-2 fade" style={{borderColor:'#fca5a5'}}>
              <div className="flex items-start gap-3">
                <EmergencyBadgeIcon/>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold" style={{color:'#b91c1c'}}>{o.name} · {o.reason}</div>
                  <div className="text-[11px] sub mt-0.5">MRN {o.mrn} · called {o.time} · {o.advice}</div>
                  <div className="text-xs sub mt-1">Advised 999, no booking — confirm the patient was followed up.</div>
                </div>
                <div className="shrink-0 flex flex-col gap-2" style={{width:148}}>
                  <button onClick={()=>onCallback(o)} className="lift-btn text-white text-sm py-2 rounded-lg" style={{background:'#dc2626'}}>Call patient back</button>
                  <button onClick={()=>onAck(o)} className="edit-btn border line text-sm py-1.5 rounded-lg">Mark followed up</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* triaged bookings */}
      {bookings.length>0 && (
        <div>
          <div className="text-xs font-semibold uppercase tracking-wide sub mb-2">Provisional bookings — confirm to notify patient</div>
          {bookings.map(o=><OvernightCard key={o.id} o={o} onConfirm={onConfirm} onEdit={onEdit} onReject={onReject}/>)}
        </div>
      )}
    </div>
  );
}

/* ---------- App ---------- */
function App(){
  const [nav,setNav] = useState('calls');
  const [calls,setCalls] = useState(makeCalls);
  const [sel,setSel] = useState('c1');
  const [bookings,setBookings] = useState([
    { id:1, name:'James Patterson', mrn:'OAK-04410', dob:'05 Feb 1955', reason:'Knee follow-up', urgency:'Routine', source:'Reception', confidence:'—', day:2, hour:12, time:'12:00' },
    { id:2, name:'Grace Nolan', mrn:'OAK-05021', dob:'22 Jun 1991', reason:'Asthma review', urgency:'Routine', source:'Reception', confidence:'—', day:3, hour:9, time:'09:00' },
  ]);
  const [notes,setNotes] = useState([]);
  const [overnight,setOvernight] = useState(OVERNIGHT_SEED);
  const notified = useRef(new Set());

  // simulation tick
  useEffect(()=>{
    const iv = setInterval(()=>{
      setCalls(cs=>cs.map(c=>{
        const nc = {...c};
        if(!['booked','ended'].includes(c.status) && c.status!=='ringing') nc.secs = c.secs + 5;
        if(c.queue.length===0) return nc;
        const [ev,...rest] = c.queue;
        nc.queue = rest;
        if(ev.line) nc.lines = [...c.lines, ev.line];
        if(ev.set) Object.assign(nc, ev.set);
        if(ev.status) nc.status = ev.status;
        return nc;
      }));
    },1300);
    return ()=>clearInterval(iv);
  },[]);

  // raise notifications on key transitions
  useEffect(()=>{
    calls.forEach(c=>{
      const key = c.id+':'+c.status;
      if((c.status==='await-approval'||c.status==='emergency') && !notified.current.has(key)){
        notified.current.add(key);
        setNotes(n=>[{ id:key, type:c.status==='emergency'?'emergency':'booking', callId:c.id, read:false,
          text: c.status==='emergency' ? `Emergency on call from ${c.name} — 999 advised` : `${c.name} — booking awaiting your approval`,
          time: new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) }, ...n]);
      }
    });
  },[calls]);

  function approve(c, override){
    const reason = (override&&override.reason) || c.proposed.reason;
    const slot = (override&&override.slot) || nextSlot(bookings, c.proposed.urgency);
    setBookings(b=>[...b,{ id:Date.now(), name:c.name, mrn:c.mrn, dob:c.dob, reason, urgency:c.proposed.urgency, source:'AI call', confidence:'High', ...slot }]);
    setCalls(cs=>cs.map(x=>x.id===c.id?{...x,status:'booked'}:x));
    setNotes(n=>[{ id:'bk'+c.id, type:'booking', read:false, callId:c.id, text:`✓ ${c.name} booked — ${DAYS[slot.day]} ${slot.time}`, time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) },...n]);
  }
  function reject(c){ setCalls(cs=>cs.map(x=>x.id===c.id?{...x,status:'ended'}:x)); }
  function cancelBooking(b){ setBookings(list=>list.filter(x=>x.id!==b.id)); }
  function editProposed(c, reason){ setCalls(cs=>cs.map(x=>x.id===c.id?{...x,proposed:{...x.proposed,reason}}:x)); }
  function ack(c){ setCalls(cs=>cs.map(x=>x.id===c.id?{...x,ack:true}:x)); }
  function callback(c){
    const first = (c.name||'there').split(' ')[0];
    const proposed = c.proposed || { reason:'Follow-up after earlier call', urgency: c.urgency==='Emergency'?'Urgent':(c.urgency||'Soon') };
    setCalls(cs=>cs.map(x=>x.id===c.id?{...x, ack:false, status:'ringing', secs:0, proposed, queue:[
      {},
      {...L('ai',`Hello ${first}, this is Oakfield Surgery calling you back about your earlier call. Is now a good time?`), status:'talking'},
      L('pt','Yes, thank you for calling back.'),
      {...L('ai','I can arrange a GP appointment to follow this up — shall I book it for you?'), status:'await-approval'},
    ]}:x));
    setSel(c.id);
    setNotes(n=>[{ id:'cb'+c.id+Date.now(), type:'booking', read:false, callId:c.id, text:`Calling back ${c.name}`, time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) },...n]);
  }
  // overnight / morning review
  function confirmOvernight(o, override){
    const reason = (override&&override.reason) || o.reason;
    const slot = (override&&override.slot) || nextSlot(bookings, o.urgency);
    setBookings(b=>[...b,{ id:Date.now(), name:o.name, mrn:o.mrn, dob:o.dob, reason, urgency:o.urgency, source:'Overnight AI', confidence:'High', ...slot }]);
    setOvernight(list=>list.map(x=>x.id===o.id?{...x,status:'confirmed'}:x));
    setNotes(n=>[{ id:'ov'+o.id, type:'booking', read:false, text:`✓ ${o.name} booked from overnight — ${DAYS[slot.day]} ${slot.time}`, time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) },...n]);
  }
  function editOvernight(o, reason){ setOvernight(list=>list.map(x=>x.id===o.id?{...x,reason}:x)); }
  function rejectOvernight(o){ setOvernight(list=>list.map(x=>x.id===o.id?{...x,status:'rejected'}:x)); }
  function ackOvernight(o){ setOvernight(list=>list.map(x=>x.id===o.id?{...x,status:'followed-up'}:x)); }
  function callbackOvernight(o){
    setOvernight(list=>list.map(x=>x.id===o.id?{...x,status:'followed-up'}:x));
    setNotes(n=>[{ id:'ovc'+o.id, type:'booking', read:false, text:`Calling back ${o.name} (overnight emergency)`, time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) },...n]);
  }

  const morningCount = overnight.filter(o=>o.status==='pending').length;
  return (
    <div className="flex">
      <Sidebar nav={nav} go={setNav} morningCount={morningCount}/>
      <div className="flex-1 min-w-0">
        <main className="px-8 py-7 main-dots min-h-screen">
          {nav==='calls' && (
            <div className="max-w-7xl mx-auto">
              {morningCount>0 && (
                <button onClick={()=>setNav('morning')} className="hover-lift w-full text-left mb-5 rounded-xl p-3 flex items-center gap-3" style={{background:'rgba(13,148,136,0.06)',border:'1px solid rgba(13,148,136,0.25)'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0D9488" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
                  <span className="text-sm flex-1"><b>{morningCount}</b> calls were captured overnight and need review</span>
                  <span className="text-sm accent-t font-medium">Open morning review →</span>
                </button>
              )}
              <LiveCalls calls={calls} sel={sel} setSel={setSel} onApprove={approve} onReject={reject} onEdit={editProposed} onAck={ack} onCallback={callback}/>
            </div>
          )}
          {nav==='morning' && <MorningReview overnight={overnight} onConfirm={confirmOvernight} onEdit={editOvernight} onReject={rejectOvernight} onAck={ackOvernight} onCallback={callbackOvernight}/>}
          {nav==='calendar' && <Calendar bookings={bookings} onCancel={cancelBooking}/>}
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
