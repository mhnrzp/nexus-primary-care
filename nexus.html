<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXUS — Unified Healthcare Platform (Primary Care demo)</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --bg:#f1f5f9; --card:#ffffff; --sidebar:#ffffff; --text:#0f172a; --sub:#64748b;
    --border:#e2e8f0; --hover:#f1f5f9; --soft:#f8fafc;
    --nhs:#005EB6; --teal:#0891b2;
  }
  .dark{
    --bg:#0b1220; --card:#111a2e; --sidebar:#0d1526; --text:#e6edf6; --sub:#94a3b8;
    --border:#1f2c44; --hover:#16213a; --soft:#0f1828;
  }
  *{ box-sizing:border-box; }
  body{ font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); margin:0; }
  .card{ background:var(--card); border:1px solid var(--border); }
  .bd{ border:1px solid var(--border); }
  .bdt{ border-top:1px solid var(--border); }
  .bdb{ border-bottom:1px solid var(--border); }
  .text-sub{ color:var(--sub); }
  .soft{ background:var(--soft); }
  .hoverable{ transition:background .12s,border-color .12s; }
  .hoverable:hover{ background:var(--hover); }
  .nhs{ background:var(--nhs); } .nhs-t{ color:var(--nhs); }
  .navitem{ color:var(--sub); transition:all .15s; }
  .navitem:hover{ background:rgba(0,94,182,.10); color:var(--nhs); }
  .navitem.active{ background:rgba(0,94,182,.12); color:var(--nhs); font-weight:600; }
  button{ font-family:inherit; cursor:pointer; transition:background .2s ease, color .2s ease, border-color .2s ease, box-shadow .2s ease, transform .12s ease; }
  button:focus-visible,a:focus-visible{ outline:2px solid var(--nhs); outline-offset:2px; }
  button:active{ transform:scale(0.98); }
  button.nhs:hover{ background:#004a99; box-shadow:0 8px 18px rgba(0,94,182,0.28); transform:translateY(-1px); }
  .hover-lift{ transition:transform .18s ease, box-shadow .18s ease; } .hover-lift:hover{ transform:translateY(-1px); box-shadow:0 8px 22px rgba(0,0,0,0.06); }
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:5px; }
  .fade{ animation:fade .3s ease-out; }
  @keyframes fade{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }
  .typing span{ animation:blink 1.2s infinite; } .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{ 0%,60%,100%{opacity:.25;} 30%{opacity:1;} }
</style>
</head>
<body>
<div id="root"></div>
<script>tailwind.config = { corePlugins:{ preflight:false } };</script>
<script type="text/babel">

  },

const pById = id => PATIENTS.find(p=>p.id===id);

/* Seed approval-queue items (the spine: nothing executes without sign-off) */
const SEED_APPROVALS = [
  { id:'a1', agent:'Call AI · after-hours', type:'Provisional booking', risk:'med', urgency:'Urgent',
    patient:'Margaret Hughes', title:'Same-day GP appointment (provisional)',
    proposed:'Book Dr Ellis · today 09:10 · 10-min telephone',
    reasoning:['Symptoms: sore throat + fever 3 days','History: hypothyroid, age 69','Red-flag screen: negative (no stridor/dysphagia/swelling)','CRP 12 (raised) from recent bloods'],
    note:'Patient NOT yet notified — awaiting GP confirmation of urgency + booking.' },
  { id:'a2', agent:'Referral agent', type:'2WW referral', risk:'high', urgency:'Urgent',
    patient:'Raymond Patel', title:'Suspected skin cancer — 2-week-wait dermatology',
    proposed:'Generate e-RS 2WW referral → Leeds Teaching Hospitals Dermatology',

  { id:'a3', agent:'Comms agent', type:'SMS reminder', risk:'low',

    proposed:'"Hi David, a reminder of your BP review with Dr Ellis tomorrow at 10:40. Reply C to confirm or call us to rebook. — Oakfield Surgery"',

    patient:'18 patients', title:'Dr Ellis off sick Thursday — reschedule plan',
    proposed:'Move 18 appts: 6 to Dr Shah, 9 to Fri, 3 telephone today. Urgent slots preserved.',
    reasoning:['Clinician absence flagged','Urgency bands respected — no Urgent moved to >same-day','DNA-risk patients prioritised for confirmation call'], note:null },
  { id:'a6', agent:'Rostering agent', type:'Cover gap', risk:'med',

    reasoning:['Expected volume high (post-bank-holiday)','Dr Shah under contracted sessions this week','WTD rest requirements satisfied'], note:null },

/* ============================ Small UI atoms ============================ */
function Badge({ urgency }){
  const u = URG[urgency]; if(!u) return null;
  return <span className={`inline-block text-[11px] font-semibold px-2 py-0.5 rounded-full ${u.c}`}>{urgency}</span>;
}
function Risk({ level }){
  const m={low:'bg-emerald-100 text-emerald-700',med:'bg-amber-100 text-amber-700',high:'bg-red-100 text-red-700'};
  return <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded ${m[level]}`}>{level.toUpperCase()} RISK</span>;
}
function Stat({ label, value, sub, accent }){
  return (
    <div className="card rounded-xl p-4">
      <div className="text-2xl font-bold" style={{color:accent||'var(--text)'}}>{value}</div>
      <div className="text-xs text-sub mt-0.5">{label}</div>
      {sub && <div className="text-[11px] mt-0.5" style={{color:'#059669'}}>{sub}</div>}
    </div>
  );
}
function SectionTitle({ children, right }){
  return <div className="flex items-center justify-between mb-2"><div className="text-xs font-semibold text-sub uppercase tracking-wide">{children}</div>{right}</div>;
}

/* ============================ Sidebar ============================ */
const NAV = [
  { k:'dashboard', label:'Dashboard', icon:'▦' },
  { k:'calls', label:'Call Handling', icon:'☎' },
  { k:'urgency', label:'Urgency Engine', icon:'⚑' },
  { k:'approvals', label:'Approval Queue', icon:'✔', badge:true },
  { k:'patients', label:'Patients', icon:'☺' },
  { k:'scheduling', label:'Scheduling', icon:'▤' },
  { k:'agents', label:'AI Admin Agents', icon:'✦' },
  { k:'audit', label:'Audit Log', icon:'≣' },
];

function Sidebar({ nav, setNav, approvalsCount }){
  return (
    <aside className="w-60 shrink-0 bdr bd h-screen sticky top-0 flex flex-col" style={{background:'var(--sidebar)',borderRight:'1px solid var(--border)',borderTop:'none',borderBottom:'none',borderLeft:'none'}}>
      <div className="px-4 py-4 bdb flex flex-col gap-1">
        <img src="logo.svg" alt="NEXUS" style={{height:24,alignSelf:'flex-start'}}/>
        <div className="text-[10px] text-sub">Unified Healthcare Platform</div>
      </div>

      <nav className="flex-1 overflow-y-auto py-3">
        <div className="px-4 text-[10px] font-semibold text-sub uppercase tracking-wide mb-1">Primary Care</div>
        {NAV.map(n=>(
          <button key={n.k} onClick={()=>setNav(n.k)}
            className={`navitem w-full flex items-center gap-3 px-4 py-2 text-sm ${nav===n.k?'active':''}`}>
            <span className="w-4 text-center opacity-70">{n.icon}</span>
            <span className="flex-1 text-left">{n.label}</span>
            {n.badge && approvalsCount>0 && <span className="text-[10px] bg-amber-500 text-white px-1.5 rounded-full">{approvalsCount}</span>}
          </button>
        ))}

        <div className="px-4 text-[10px] font-semibold text-sub uppercase tracking-wide mt-4 mb-1">Other care settings</div>
        {[['Secondary Care','🏥'],['Tertiary Care','🩺']].map(([l,i])=>(
          <div key={l} className="w-full flex items-center gap-3 px-4 py-2 text-sm opacity-40 cursor-not-allowed select-none">
            <span className="w-4 text-center">{i}</span>
            <span className="flex-1 text-left">{l}</span>
            <span className="text-[9px] bd rounded px-1 py-0.5 text-sub">SOON</span>
          </div>

      <div className="px-4 py-3 bdt text-[10px] text-sub leading-relaxed">
        Demo · primary care only. No live clinical system. Every AI action requires human sign-off.

}

/* ============================ Topbar ============================ */
function Topbar({ role, setRole, dark, setDark, title }){

          {ROLES.map(r=><option key={r}>{r}</option>)}

        <button onClick={()=>setDark(!dark)} className="bd rounded-lg px-2.5 py-1.5 text-sm hoverable" title="Toggle dark mode">
          {dark?'☀':'🌙'}
        </button>
        <div className="w-8 h-8 rounded-full nhs text-white flex items-center justify-center text-xs font-semibold">DE</div>
      </div>
    </header>
  );
}

/* ============================ Dashboard (role-aware) ============================ */
function Dashboard({ role, approvals, go }){
  const transcripts = approvals.filter(a=>a.agent.startsWith('Call'));

    <div className="space-y-4 fade">

        <Stat label="Calls in queue" value="3" />
        <Stat label="Overflow → AI" value="2" sub="AI handling" accent="var(--teal)"/>
        <Stat label="Avg wait" value="40s" sub="vs 11m before"/>
        <Stat label="Comms to approve" value={approvals.filter(a=>a.agent.startsWith('Comms')).length}/>
      </div>
      <div className="grid grid-cols-2 gap-4">
        <div className="card rounded-xl p-4">
          <SectionTitle right={<button onClick={()=>go('calls')} className="text-xs nhs-t hover:underline">Open call handling →</button>}>Live call queue</SectionTitle>

            <div key={i} className="flex items-center justify-between py-2 bdb last:border-0 text-sm">
              <span>{c[0]} — <span className="text-sub">{c[1]}</span></span>
              <span className={`text-[10px] px-2 py-0.5 rounded-full ${c[2]==='AI'?'bg-cyan-100 text-cyan-700':'bg-blue-100 text-blue-700'}`}>{c[2]}</span>

        <div className="card rounded-xl p-4">
          <SectionTitle right={<button onClick={()=>go('approvals')} className="text-xs nhs-t hover:underline">Open →</button>}>Communications awaiting approval</SectionTitle>
          {approvals.filter(a=>a.agent.startsWith('Comms')).map(a=>(
            <div key={a.id} className="py-2 bdb last:border-0 text-sm"><div className="font-medium">{a.title}</div><div className="text-sub text-xs">{a.patient}</div></div>
          ))}
        </div>
      </div>
    </div>
  );
  if(role==='Practice Manager') return (
    <div className="space-y-4 fade">
      <div className="grid grid-cols-4 gap-3">
        <Stat label="Clinic utilisation" value="91%" sub="+6% vs last wk"/>
        <Stat label="DNA rate" value="3.2%" sub="−1.8% (AI reminders)"/>
        <Stat label="Referrals this month" value="64"/>
        <Stat label="Rota coverage" value="98%" sub="1 gap Fri PM"/>
      </div>
      <div className="grid grid-cols-2 gap-4">
        <div className="card rounded-xl p-4">
          <SectionTitle>AI agent performance (7 days)</SectionTitle>
          {[['Scheduling agent','142 actions','96% approved'],['Comms agent','318 drafts','99% approved'],['Referral agent','27 letters','89% approved, 3 edited'],['Rostering agent','11 plans','100% approved']].map((r,i)=>(
            <div key={i} className="flex items-center justify-between py-2 bdb last:border-0 text-sm">
              <span className="font-medium">{r[0]}</span><span className="text-sub text-xs">{r[1]}</span><span className="text-emerald-600 text-xs">{r[2]}</span>
            </div>
          ))}
        </div>
        <div className="card rounded-xl p-4">
          <SectionTitle>Operational snapshot</SectionTitle>
          <div className="grid grid-cols-2 gap-3 text-sm">
            {[['Same-day demand met','88%'],['8am call abandonment','2%'],['2WW within target','100%'],['Staff hours saved/wk','~34h']].map((r,i)=>(
              <div key={i} className="soft rounded-lg p-3"><div className="text-lg font-semibold">{r[1]}</div><div className="text-xs text-sub">{r[0]}</div></div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
  // GP / Nurse
  return (
    <div className="space-y-4 fade">
      <div className="grid grid-cols-4 gap-3">
        <Stat label="Pending approvals" value={approvals.length} accent="#d97706"/>
        <Stat label="Urgency flags" value={approvals.filter(a=>a.urgency==='Urgent'||a.urgency==='Emergency').length} accent="#ea580c"/>
        <Stat label="Transcripts to review" value={transcripts.length}/>
        <Stat label="Results to acknowledge" value="2" accent="#dc2626"/>
      </div>
      <div className="grid grid-cols-3 gap-4">
        <div className="card rounded-xl p-4 col-span-2">
          <SectionTitle right={<button onClick={()=>go('approvals')} className="text-xs nhs-t hover:underline">Open queue →</button>}>Approvals needing you</SectionTitle>
          {approvals.slice(0,4).map(a=>(
            <button key={a.id} onClick={()=>go('approvals')} className="w-full text-left flex items-center gap-3 py-2 bdb last:border-0 hoverable rounded px-1">
              <span className="text-[10px] text-sub w-28 shrink-0">{a.agent}</span>
              <span className="flex-1 text-sm">{a.title}<span className="text-sub"> · {a.patient}</span></span>
              {a.urgency && <Badge urgency={a.urgency}/>}
            </button>
          ))}
        </div>
        <div className="card rounded-xl p-4">
          <SectionTitle right={<button onClick={()=>go('scheduling')} className="text-xs nhs-t hover:underline">Clinic →</button>}>Today's clinic</SectionTitle>
          {[['09:10','M. Hughes','Urgent'],['10:40','D. Okafor','Routine'],['11:00','R. Patel','Soon']].map((c,i)=>(
            <div key={i} className="flex items-center gap-2 py-2 bdb last:border-0 text-sm">
              <span className="text-sub w-12">{c[0]}</span><span className="flex-1">{c[1]}</span><Badge urgency={c[2]}/>
            </div>
          ))}
        </div>
      </div>
      <div className="grid grid-cols-2 gap-4">
        <div className="card rounded-xl p-4">
          <SectionTitle right={<button onClick={()=>go('patients')} className="text-xs nhs-t hover:underline">View →</button>}>Lab results requiring acknowledgement</SectionTitle>
          {[['M. Hughes','CRP 12 (raised), TSH 5.8 (raised)'],['R. Patel','HbA1c 69 (raised)']].map((r,i)=>(
            <div key={i} className="py-2 bdb last:border-0 text-sm"><span className="font-medium">{r[0]}</span><span className="text-sub"> — {r[1]}</span></div>
          ))}
        </div>
        <div className="card rounded-xl p-4">
          <SectionTitle right={<button onClick={()=>go('agents')} className="text-xs nhs-t hover:underline">Referrals →</button>}>Referral pipeline</SectionTitle>
          {[['R. Patel','2WW dermatology','Awaiting GP sign-off'],['M. Hughes','Routine ortho (knee)','Draft']].map((r,i)=>(
            <div key={i} className="flex items-center justify-between py-2 bdb last:border-0 text-sm"><span>{r[0]} · <span className="text-sub">{r[1]}</span></span><span className="text-[11px] text-amber-600">{r[2]}</span></div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================ Call Handling ============================ */

function CallHandling({ role, addApproval }){
  const [mode,setMode] = useState('busy');
  const [shown,setShown] = useState(0);
  const [typing,setTyping] = useState(null);
  const [result,setResult] = useState(null);
  const [recoSymptoms,setReco] = useState('');
  const boxRef = useRef(null); const timers = useRef([]);
  const sc = CALL_SCRIPTS[mode];

  useEffect(()=>()=>timers.current.forEach(clearTimeout),[]);
  useEffect(()=>{ if(boxRef.current) boxRef.current.scrollTop = boxRef.current.scrollHeight; },[shown,typing]);

  function play(m){
    timers.current.forEach(clearTimeout); timers.current=[];
    setMode(m); setShown(0); setTyping(null); setResult(null);
    const steps = CALL_SCRIPTS[m].steps; let t=300;
    steps.forEach((st,idx)=>{
      if(st[0]!=='sys'){ timers.current.push(setTimeout(()=>setTyping(st[0]),t)); t+= st[0]==='ai'?1100:850; }
      timers.current.push(setTimeout(()=>{ setTyping(null); setShown(idx+1); },t)); t+=650;
    });
    timers.current.push(setTimeout(()=>setResult(CALL_SCRIPTS[m].out),t));
  }

  function sendToGP(){
    const o = sc.out;
    addApproval({
      id:'call'+Date.now(), agent:'Call AI · '+(mode==='after'?'after-hours':mode==='emergency'?'after-hours':'overflow'),
      type: o.urgency==='Emergency'?'Emergency log':'Provisional booking', risk: o.urgency==='Emergency'?'high':'med',
      urgency:o.urgency, patient: mode==='emergency'?'Tom Bennett':'Margaret Hughes',
      title: o.urgency==='Emergency'?'Emergency call — 999 advised (review)':'Provisional booking from AI call',
      proposed:o.booking,
      reasoning:['Captured from full call transcript','Urgency engine rating: '+o.urgency,'Red-flag screen completed in call'],
      note:'Patient NOT notified until GP confirms.'
    });
    setResult({...o, sent:true});
  }

  return (
    <div className="space-y-4 fade">
      {/* mode tabs */}
      <div className="flex gap-2 flex-wrap">
        {role==='Receptionist' &&
          <button onClick={()=>{setMode('reception');setResult(null);}} className={`text-sm px-3 py-2 rounded-lg bd ${mode==='reception'?'nhs text-white':'card hoverable'}`}>Receptionist on call</button>}
        {Object.entries(CALL_SCRIPTS).map(([k,v])=>(
          <button key={k} onClick={()=>play(k)} className={`text-sm px-3 py-2 rounded-lg bd ${mode===k?'nhs text-white':'card hoverable'}`}>{v.label}</button>
        ))}
      </div>

      {mode==='reception' ? (
        <div className="grid grid-cols-2 gap-4">
          <div className="card rounded-xl p-4">
            <SectionTitle>Receptionist — log patient symptoms</SectionTitle>
            <div className="text-xs text-sub mb-2">Patient: Mrs A. Begum · DOB 03/05/1990</div>
            <textarea value={recoSymptoms} onChange={e=>setReco(e.target.value)} placeholder="Type symptoms as the patient describes them… e.g. 'cough 5 days, now wheezy, mild temp'"
              className="w-full bd rounded-lg p-3 text-sm card h-32 resize-none" style={{color:'var(--text)'}}/>
            <button onClick={()=>setResult({urgency:'Soon',booking:'Suggested: GP within 48h'})} className="mt-2 nhs text-white text-sm px-4 py-2 rounded-lg">Run urgency engine</button>
          </div>
          <div className="card rounded-xl p-4">
            <SectionTitle>Urgency result</SectionTitle>
            {!result ? <div className="text-sm text-sub">Log symptoms and run the engine. The rating is computed from symptoms + patient history — receptionists can view it but cannot change it.</div> : (
              <div className="fade space-y-2">
                <div className="flex items-center gap-2"><Badge urgency={result.urgency}/><span className="text-sm text-sub">{URG[result.urgency].d}</span></div>
                <div className="soft rounded-lg p-3 text-sm">{result.booking}</div>
                <div className="text-xs text-amber-600">🔒 Read-only for receptionists. Sent to GP to confirm before the patient is notified.</div>
              </div>
            )}
          </div>
        </div>
      ) : (
        <div className="grid grid-cols-12 gap-4">
          {/* transcript */}
          <div className="col-span-7 card rounded-xl flex flex-col overflow-hidden">
            <div className="px-4 py-2 bdb text-xs text-sub">{sc.banner}</div>
            <div ref={boxRef} className="p-4 space-y-2 overflow-y-auto" style={{minHeight:380,maxHeight:440}}>
              {sc.steps.slice(0,shown).map((st,i)=> st[0]==='sys' ? (
                <div key={i} className="text-center text-xs bg-red-50 text-red-700 bd rounded-md py-1.5 px-3 fade" style={{borderColor:'#fecaca'}}>{st[1]}</div>
              ) : (
                <div key={i} className={`flex ${st[0]==='ai'?'justify-start':'justify-end'} fade`}>
                  <div className={`max-w-[80%] rounded-2xl px-3.5 py-2 text-sm ${st[0]==='ai'?'nhs text-white rounded-tl-sm':'soft bd rounded-tr-sm'}`}>
                    {st[0]==='ai' && <div className="text-[10px] uppercase opacity-70 mb-0.5">AI voice agent</div>}{st[1]}
                  </div>
                </div>
              ))}
              {typing && <div className={`flex ${typing==='ai'?'justify-start':'justify-end'}`}><div className={`typing rounded-2xl px-3 py-2 ${typing==='ai'?'nhs text-white':'soft bd'}`}><span>●</span><span>●</span><span>●</span></div></div>}
              {shown===0 && <div className="text-sm text-sub text-center py-12">Click a scenario above to play the call.</div>}
            </div>
          </div>
          {/* outcome */}
          <div className="col-span-5 space-y-3">
            <div className="card rounded-xl p-4">
              <SectionTitle>Live capture</SectionTitle>
              <div className="text-sm space-y-1">
                <div><span className="text-sub">Patient: </span>{mode==='emergency'?'Tom Bennett':'Margaret Hughes'}</div>
                <div><span className="text-sub">Transcript: </span>{shown>0?'recording…':'—'} {result&&'✓ complete'}</div>
                <div><span className="text-sub">Red-flag screen: </span>{result?(mode==='emergency'?'POSITIVE':'negative'):'pending'}</div>
              </div>
            </div>
            {result && (
              <div className="card rounded-xl p-4 fade">
                <SectionTitle>Urgency engine output</SectionTitle>
                <div className="flex items-center gap-2 mb-2"><Badge urgency={result.urgency}/><span className="text-xs text-sub">{URG[result.urgency].d}</span></div>
                <div className="soft rounded-lg p-3 text-sm mb-2">{result.booking}</div>
                {result.urgency==='Emergency'
                  ? <div className="text-xs text-red-600 font-medium">No booking made. 999/A&E advised. Logged for GP review.</div>
                  : result.sent
                    ? <div className="text-xs text-emerald-600">✓ Sent to GP approval queue. Patient will be notified only after GP confirms.</div>
                    : <button onClick={sendToGP} className="w-full nhs text-white text-sm py-2 rounded-lg">Send to GP approval queue →</button>}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================ Urgency Engine ============================ */

/* ============================ Approval Queue (the spine) ============================ */
function ApprovalQueue({ approvals, decide, role }){
  const [sort,setSort] = useState('urgency');
  const [expand,setExpand] = useState({});
  const order = {Emergency:0,Urgent:1,Soon:2,Routine:3,undefined:4};
  const sorted = [...approvals].sort((a,b)=> sort==='urgency' ? (order[a.urgency]-order[b.urgency]) : a.agent.localeCompare(b.agent));
  const lowRisk = approvals.filter(a=>a.risk==='low');

  return (
    <div className="space-y-3 fade">
      <div className="flex items-center gap-3">
        <SectionTitle>Unified approval queue — {approvals.length} pending</SectionTitle>
        <div className="ml-auto flex items-center gap-2 text-xs">
          <span className="text-sub">Sort</span>
          <select value={sort} onChange={e=>setSort(e.target.value)} className="bd rounded px-2 py-1 card" style={{color:'var(--text)'}}>
            <option value="urgency">Urgency</option><option value="agent">Agent</option>
          </select>
          {lowRisk.length>0 && <button onClick={()=>lowRisk.forEach(a=>decide(a,'Batch-approved'))} className="bd hoverable rounded px-3 py-1">Approve all low-risk ({lowRisk.length})</button>}
        </div>
      </div>
      {approvals.length===0 && <div className="card rounded-xl p-8 text-center text-sub">Queue clear. Every AI action has been reviewed. ✓</div>}
      {sorted.map(a=>(
        <div key={a.id} className="card rounded-xl p-4 fade">
          <div className="flex items-start gap-3">
            <div className="flex-1">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="text-[10px] text-white px-2 py-0.5 rounded-full" style={{background:'var(--teal)'}}>{a.agent}</span>
                <span className="text-[10px] text-sub">{a.type}</span>
                {a.urgency && <Badge urgency={a.urgency}/>}
                <Risk level={a.risk}/>
              </div>
              <div className="font-semibold mt-1.5">{a.title}</div>
              <div className="text-sm text-sub">{a.patient}</div>
              <div className="soft rounded-lg p-3 text-sm mt-2"><span className="text-sub text-xs">Proposed action: </span>{a.proposed}</div>
              <button onClick={()=>setExpand(e=>({...e,[a.id]:!e[a.id]}))} className="text-xs nhs-t hover:underline mt-2">{expand[a.id]?'▴ Hide reasoning':'▾ Show reasoning & data inputs'}</button>
              {expand[a.id] && (
                <ul className="mt-2 space-y-1 text-xs text-sub fade">
                  {a.reasoning.map((r,i)=><li key={i}>• {r}</li>)}
                  {a.note && <li className="text-amber-600 mt-1">⚑ {a.note}</li>}
                </ul>
              )}
            </div>
          </div>
          <div className="flex gap-2 mt-3">
            {role==='Receptionist' && a.risk!=='low'
              ? <div className="text-xs text-amber-600 py-2">🔒 Clinical/medium-risk actions require a GP or manager to approve.</div>
              : (<>
                <button onClick={()=>decide(a,'Approved')} className="nhs text-white text-sm px-4 py-1.5 rounded-lg">Approve & execute</button>
                <button onClick={()=>decide(a,'Edited & approved')} className="bd card hoverable text-sm px-3 py-1.5 rounded-lg">Edit</button>
                <button onClick={()=>decide(a,'Rejected — clinically inappropriate')} className="bd card hoverable text-sm px-3 py-1.5 rounded-lg">Reject</button>
                <button onClick={()=>decide(a,'Escalated to senior reviewer')} className="bd card hoverable text-sm px-3 py-1.5 rounded-lg">Escalate</button>
              </>)}
          </div>
        </div>
      ))}
    </div>
  );
}

      <div className="soft rounded-lg p-3 text-xs text-sub">Trend graphs (eGFR, HbA1c, LFTs, lipids, TFTs) · clinician ordering with clinical-indication field · critical-result GP sign-off workflow · DICOM imaging viewer · results feed the urgency engine.</div>
      {p.labs.some(l=>l.flag) && <button className="nhs text-white text-sm px-4 py-2 rounded-lg">Acknowledge abnormal results</button>}
    </div>
  );
}
function CDS({p}){
  const scores = p.id==='do'?[['QRISK3','14.2%','10-yr CVD']]:p.id==='mh'?[['CHA₂DS₂-VASc','2','—'],['NEWS2','1','low']]:[['QRISK3','—','—']];
  return (
    <div className="space-y-3">
      <div className="bg-amber-50 bd rounded-lg p-3 text-sm" style={{borderColor:'#fde68a'}}>
        <span className="font-semibold text-amber-700">⚑ Guideline alerts: </span>
        {p.id==='mh'?'NICE NG84 — FeverPAIN before antibiotics. BNF: penicillin contraindicated (allergy).':p.id==='do'?'NICE NG136 — BP above target, consider up-titration; check U&Es.':'NICE NG12 — suspected melanoma, 2WW pathway.'}
      </div>
      <div className="grid grid-cols-3 gap-3">
        {scores.map((s,i)=><div key={i} className="soft rounded-lg p-3 text-center"><div className="text-lg font-semibold">{s[1]}</div><div className="text-xs text-sub">{s[0]}</div><div className="text-[10px] text-sub">{s[2]}</div></div>)}
      </div>
      <div className="soft rounded-lg p-3 text-xs text-sub">Decision support is advisory only — <b>no differential diagnosis is generated</b>. Includes preventive-care & chronic-disease review reminders, drug-allergy and drug-disease contraindication alerts. The clinician decides; nothing is actioned without sign-off.</div>
    </div>
  );
}

/* ============================ Scheduling ============================ */
function Scheduling({ role }){
  const slots = [
    ['08:50','M. Hughes','Urgent','Telephone'],['09:10','— (urgent reserve)','Urgent','Held'],
    ['09:30','S. Cole','Routine','F2F'],['10:00','— available','','Open'],
    ['10:40','D. Okafor','Routine','F2F'],['11:00','R. Patel','Soon','F2F · 2WW'],
    ['11:20','— available','','Open'],
  ];
  return (
    <div className="space-y-4 fade">
      <div className="grid grid-cols-4 gap-3">
        <Stat label="Today's slots" value="24" /><Stat label="Urgent reserved" value="4" /><Stat label="High DNA-risk" value="2" sub="reminder queued"/><Stat label="2WW routed" value="1"/>
      </div>
      <div className="grid grid-cols-12 gap-4">
        <div className="col-span-8 card rounded-xl p-4">
          <SectionTitle>Today — Dr Ellis</SectionTitle>
          {slots.map((s,i)=>(
            <div key={i} className="flex items-center gap-3 py-2 bdb last:border-0 text-sm">
              <span className="text-sub w-12">{s[0]}</span>
              <span className="flex-1">{s[1]}</span>
              {s[2] && <Badge urgency={s[2]}/>}
              <span className="text-[11px] text-sub w-20 text-right">{s[3]}</span>
              {role!=='Receptionist' && s[1].includes('available') && <button className="text-xs nhs-t hover:underline">book</button>}
            </div>
          ))}
        </div>
        <div className="col-span-4 space-y-3">
          <div className="card rounded-xl p-4">
            <SectionTitle>Scheduling agent</SectionTitle>
            <div className="text-sm text-sub space-y-1.5">
              <div>• Waiting list re-ranked by deterioration, cancellations & DNA history</div>
              <div>• Urgent & 2WW routed to dedicated slots</div>
              <div>• High-DNA appointments flagged for reminder</div>
            </div>
            <div className="mt-2 text-[11px] text-amber-600">🔒 Admin can move appointments only within the same urgency band. Reschedule plans go to the approval queue.</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================ AI Agents ============================ */
function Agents({ approvals, go }){
  const defs = [
    ['Scheduling agent','▤','Matches urgency to slots, re-ranks waiting lists, builds reschedule plans on clinician absence, flags DNA risk, routes 2WW. Never overrides urgency bands.'],
    ['Communications agent','✉','Drafts reminders, visit summaries, recall & screening letters across SMS / email / NHS App. Warm, human tone. Respects consent & opt-outs. All outbound held in draft for approval.'],
    ['Referral agent','➦','Spots referral indicators, recommends to GP, pre-fills structured e-RS letters, suggests specialty/site, tracks RTT clock & breach, extracts findings from outcome letters.'],
    ['Rostering agent','🗓','Builds rotas from expected volume & skill mix, tracks leave & sickness, surfaces cover gaps, checks WTD & contract sessions, handles shift swaps. Changes go to manager approval.'],
  ];
  return (
    <div className="space-y-4 fade">
      <div className="card rounded-xl p-4" style={{background:'rgba(8,145,178,.08)',borderColor:'rgba(8,145,178,.3)'}}>
        <div className="text-sm"><b className="nhs-t">Global rule:</b> every consequential AI action enters the <button onClick={()=>go('approvals')} className="nhs-t underline">unified approval queue</button> for human sign-off before execution. Agents draft and recommend — humans decide.</div>
      </div>
      <div className="grid grid-cols-2 gap-4">
        {defs.map(([name,icon,desc])=>{
          const mine = approvals.filter(a=>a.agent.toLowerCase().includes(name.split(' ')[0].toLowerCase()));
          return (
            <div key={name} className="card rounded-xl p-4">
              <div className="flex items-center gap-2 mb-1"><span className="w-8 h-8 rounded-lg flex items-center justify-center text-white" style={{background:'var(--teal)'}}>{icon}</span><span className="font-semibold">{name}</span>
                {mine.length>0 && <span className="ml-auto text-[11px] bg-amber-500 text-white px-2 py-0.5 rounded-full">{mine.length} pending</span>}</div>
              <div className="text-sm text-sub leading-snug">{desc}</div>
              {mine.length>0 && <button onClick={()=>go('approvals')} className="mt-2 text-xs nhs-t hover:underline">Review {mine.length} proposed action{mine.length>1?'s':''} →</button>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================ Audit ============================ */
function Audit({ log }){
  return (
    <div className="space-y-3 fade">
      <SectionTitle>Immutable audit log</SectionTitle>
      <div className="card rounded-xl divide-y" style={{borderColor:'var(--border)'}}>
        {log.length===0 && <div className="p-6 text-sm text-sub text-center">No actions recorded yet. Approve or reject items in the queue to populate the audit trail.</div>}
        {log.map((e,i)=>(
          <div key={i} className="p-3 text-sm flex items-center gap-3 bdb last:border-0">
            <span className="text-xs text-sub w-16">{e.time}</span>
            <span className="text-[10px] text-white px-2 py-0.5 rounded-full" style={{background:'var(--teal)'}}>{e.agent}</span>
            <span className="flex-1">{e.title} <span className="text-sub">· {e.patient}</span></span>
            <span className={`text-[11px] px-2 py-0.5 rounded-full ${e.verdict.startsWith('Rejected')?'bg-red-100 text-red-600':e.verdict.startsWith('Escalated')?'bg-amber-100 text-amber-700':'bg-emerald-100 text-emerald-700'}`}>{e.verdict}</span>
            <span className="text-xs text-sub">by {e.by}</span>
          </div>
        ))}
      </div>
      <div className="text-[11px] text-sub">Tamper-evident · records every approval, edit, rejection and escalation with actor, timestamp and reason code.</div>
    </div>
  );
}

/* ============================ App ============================ */
function App(){
  const [dark,setDark] = useState(false);
  const [role,setRole] = useState('GP');
  const [nav,setNav] = useState('dashboard');
  const [approvals,setApprovals] = useState(SEED_APPROVALS);
  const [log,setLog] = useState([]);

  useEffect(()=>{ document.body.classList.toggle('dark',dark); },[dark]);

  function decide(item,verdict){
    setApprovals(a=>a.filter(x=>x.id!==item.id));
    setLog(l=>[{ time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}), agent:item.agent, title:item.title, patient:item.patient, verdict, by:role },...l]);
  }
  function addApproval(item){ setApprovals(a=>[item,...a]); }

  const titles = {dashboard:role+' dashboard',calls:'Call handling',urgency:'Urgency engine',approvals:'Approval queue',patients:'Patients & clinical record',scheduling:'Scheduling',agents:'AI admin agents',audit:'Audit log'};

  return (
    <div className="flex">
      <Sidebar nav={nav} setNav={setNav} approvalsCount={approvals.length}/>
      <div className="flex-1 min-w-0">
        <Topbar role={role} setRole={setRole} dark={dark} setDark={setDark} title={titles[nav]}/>
        <main className="p-6">
          {nav==='dashboard' && <Dashboard role={role} approvals={approvals} go={setNav}/>}
          {nav==='calls' && <CallHandling role={role} addApproval={addApproval}/>}
          {nav==='urgency' && <UrgencyEngine role={role}/>}
          {nav==='approvals' && <ApprovalQueue approvals={approvals} decide={decide} role={role}/>}
          {nav==='patients' && <Patients role={role}/>}
          {nav==='scheduling' && <Scheduling role={role}/>}
          {nav==='agents' && <Agents approvals={approvals} go={setNav}/>}
          {nav==='audit' && <Audit log={log}/>}
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
